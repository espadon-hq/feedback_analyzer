<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Аналіз відгуків{% endblock %}</title>
    <style>
        /* Базові стилі для всього застосунку */
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }

        /* Навігаційна панель */
        nav {
            background-color: #2c3e50;
            padding: 12px 20px;
            margin-bottom: 24px;
            border-radius: 6px;
        }

        nav a {
            color: #ecf0f1;
            text-decoration: none;
            margin-right: 20px;
            font-size: 15px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Основний контейнер сторінки */
        .container {
            background-color: #fff;
            padding: 24px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        h1 { font-size: 22px; margin-bottom: 16px; }
        h2 { font-size: 18px; margin-bottom: 12px; }

        /* Форми */
        form { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
            font-size: 14px;
        }

        input[type="text"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea { resize: vertical; min-height: 80px; }

        button, input[type="submit"] {
            background-color: #2c3e50;
            color: white;
            padding: 8px 18px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover, input[type="submit"]:hover {
            background-color: #34495e;
        }

        /* Таблиця відгуків */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 10px 8px;
            text-align: left;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #eee;
            vertical-align: top;
        }

        tr:hover { background-color: #f9f9f9; }

        /* Мітки тональності */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-positive { background-color: #d4edda; color: #155724; }
        .badge-negative { background-color: #f8d7da; color: #721c24; }
        .badge-neutral  { background-color: #e2e3e5; color: #383d41; }

        /* Повідомлення */
        .message-success {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        .message-error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        /* Кнопка видалення */
        .btn-delete {
            background-color: #c0392b;
            padding: 4px 10px;
            font-size: 12px;
        }

        .btn-delete:hover { background-color: #e74c3c; }

        hr { border: none; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<nav>
    <a href="/">Відгуки</a>
    <a href="/import">Імпорт CSV</a>
    <a href="/stats">Статистика</a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
