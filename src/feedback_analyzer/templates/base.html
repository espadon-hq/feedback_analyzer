<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Аналіз відгуків{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 text-gray-800 min-h-screen">

    <nav class="bg-green-900 text-white px-6 py-3 shadow-md">
        <div class="max-w-5xl mx-auto flex gap-6 items-center">
            <span class="font-bold text-lg tracking-tight text-green-100">
                Аналіз відгуків
            </span>
            <a href="/"
               class="text-green-300 hover:text-white transition text-sm font-medium">
                Відгуки
            </a>
            <a href="/import"
               class="text-green-300 hover:text-white transition text-sm font-medium">
                Імпорт CSV
            </a>
            <a href="/stats"
               class="text-green-300 hover:text-white transition text-sm font-medium">
                Статистика
            </a>
        </div>
    </nav>

    <!-- Темна акцентна смужка -->
    <div class="h-1 bg-gradient-to-r from-green-700 via-teal-600 to-green-800"></div>

    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
